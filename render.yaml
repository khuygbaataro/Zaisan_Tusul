# Render Blueprint for the Zaisan High Land Messenger chatbot.
# Free tier: 750 hours/month, free HTTPS, sleeps after ~15 min idle.
#
# Secrets (sync: false) are NOT in this file — paste them into the Render
# dashboard once under the service's Environment tab.
services:
  - type: web
    name: zaisan-tusul-bot
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-7
      - key: FACEBOOK_PAGE_ACCESS_TOKEN
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: FACEBOOK_VERIFY_TOKEN
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
